<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 30px;
  background: #fff9e6;
  color: #5a4d2f;
  min-height: 100vh;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #fff;
  padding: 30px 40px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(204,170,37,.25);
  border: 1px solid #e4d58b;
}

h2 {
  text-align: center;
  color: #997d0e;
  font-weight: 900;
  font-size: 2.5rem;
  margin-bottom: 30px;
}

input,
select {
  padding: 14px 18px;
  margin: 8px 5px;
  border: 2px solid #e4d58b;
  border-radius: 14px;
  background: #fff9d7;
  color: #5a4d2f;
  font-size: 16px;
  transition: .3s;
}

input::placeholder {
  color: #b3a35a;
}

input:focus,
select:focus {
  outline: none;
  border-color: #d4bc0a;
  background: #ece587;
}

#email {
  width: 280px;
}

button {
  padding: 14px 28px;
  background: #d4bc0a;
  color: #fff;
  border: none;
  border-radius: 14px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  margin: 8px 5px;
  transition: .3s;
}

button:hover {
  background: #a68b06;
}

.cancel {
  background: #888;
}

.cancel:hover {
  background: #555;
}

#search {
  width: 100%;
  margin-top: 15px;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 14px;
  margin-top: 30px;
}

th, td {
  padding: 16px 20px;
  text-align: left;
}

th {
  background: #d4bc0a;
  color: #fff;
  font-weight: 700;
  border-radius: 14px 14px 0 0;
}

table th:nth-child(2),
table td:nth-child(2) {
  width: 280px;
}

tbody tr {
  background: #fff9d7;
  box-shadow: 0 3px 14px rgba(212,188,10,.2);
  border-radius: 16px;
  transition: .3s;
}

tbody tr:hover {
  background: #ece587;
  box-shadow: 0 4px 20px rgba(212,188,10,.4);
}

tbody tr td:first-child {
  border-radius: 16px 0 0 16px;
}

tbody tr td:last-child {
  border-radius: 0 16px 16px 0;
}

.actions button {
  padding: 8px 14px;
  font-size: 14px;
  border-radius: 12px;
  margin-right: 6px;
}

.actions button:first-child {
  background: #28a745;
}

.actions button:last-child {
  background: #dc3545;
}

.search-filter {
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">
<h2>Student Management</h2>

<input id="name" placeholder="Name">
<input id="email" type="email" placeholder="Email">
<input id="age" type="number" placeholder="Age">
<select id="course">
<option value="">Select course</option>
<option>BCA</option><option>BBA</option>
<option>BSC</option><option>BCOM</option>
<option>MCOM</option><option>MCA</option>
</select><br>

<button id="mainBtn">Add</button>
<button id="cancelBtn" class="cancel" style="display:none">Cancel</button>

<div class="search-filter">
<input id="search" placeholder="Search...">
</div>

<table>
<thead>
<tr>
<th>Name</th><th>Email</th><th>Age</th><th>Course</th><th>Actions</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<script>
let students=JSON.parse(localStorage.getItem("students"))||[],edit=-1,
nameInput=document.getElementById("name"),
emailInput=document.getElementById("email"),
ageInput=document.getElementById("age"),
courseInput=document.getElementById("course"),
searchInput=document.getElementById("search"),
list=document.getElementById("list"),
mainBtn=document.getElementById("mainBtn"),
cancelBtn=document.getElementById("cancelBtn");

const save=()=>localStorage.setItem("students",JSON.stringify(students));

function render(){
let s=searchInput.value.toLowerCase();
list.innerHTML=students.map((x,i)=>
(x.n+x.e+x.c).toLowerCase().includes(s)?
`<tr>
<td>${x.n}</td><td>${x.e}</td><td>${x.a}</td><td>${x.c}</td>
<td class="actions">
<button onclick="editStudent(${i})">Edit</button>
<button onclick="deleteStudent(${i})">Delete</button>
</td></tr>`:"").join("");
}

function resetForm(){nameInput.value=emailInput.value=ageInput.value=courseInput.value="";edit=-1;mainBtn.innerText="Add";cancelBtn.style.display="none";}

mainBtn.onclick=function(){
let n=nameInput.value.trim(),e=emailInput.value.trim(),a=ageInput.value.trim(),c=courseInput.value;
if(!n||!e||!a||!c)return;
edit>-1?students[edit]={n,e,a,c}:students.push({n,e,a,c});
save();resetForm();render();
};

cancelBtn.onclick=resetForm;

function editStudent(i){
let s=students[i];
nameInput.value=s.n;emailInput.value=s.e;ageInput.value=s.a;courseInput.value=s.c;
edit=i;mainBtn.innerText="Update";cancelBtn.style.display="inline-block";
}

function deleteStudent(i){students.splice(i,1);save();render();}
searchInput.oninput=render;render();
</script>
</body>
</html>
